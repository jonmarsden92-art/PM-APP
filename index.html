<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FluxForge</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: system-ui; }
.nav-btn { padding:8px; border-radius:6px; display:block; width:100%; text-align:left; }
.nav-btn:hover { background:#374151; }
</style>
</head>

<body class="bg-gray-100">

<div class="flex min-h-screen">

  <!-- Sidebar -->
  <aside class="w-64 bg-gray-900 text-white p-4 flex flex-col">
    <h1 class="text-xl font-bold mb-6">FluxForge</h1>

    <nav class="space-y-2">
      <button class="nav-btn" data-action="dashboard">Dashboard</button>
      <button class="nav-btn" data-action="projects">Projects</button>
      <button class="nav-btn" data-action="kanban">Kanban</button>
    </nav>

    <button data-action="new-project" class="mt-auto bg-blue-500 py-2 rounded">
      + New Project
    </button>

    <button data-action="export" class="mt-2 bg-gray-700 py-2 rounded">Export</button>
    <button data-action="import" class="mt-2 bg-gray-700 py-2 rounded">Import</button>
  </aside>

  <!-- Main -->
  <main class="flex-1 p-6">
    <h1 id="title" class="text-2xl font-bold mb-6"></h1>
    <div id="content"></div>
  </main>

</div>

<!-- Modal -->
<div id="modal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center">
  <div class="bg-white p-6 rounded w-96">
    <h2 class="font-bold mb-4">New Project</h2>

    <input id="project-name" class="w-full border p-2 mb-3" placeholder="Name">
    <textarea id="project-desc" class="w-full border p-2 mb-3" placeholder="Description"></textarea>

    <div class="flex justify-between">
      <button data-action="share">Share</button>
      <div>
        <button data-action="close-modal">Cancel</button>
        <button data-action="save-project" class="bg-blue-500 text-white px-4 py-2 rounded">Save</button>
      </div>
    </div>

    <div id="share-link" class="text-xs mt-3 break-all text-blue-600"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
