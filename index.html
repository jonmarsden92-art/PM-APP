<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FluxForge Enterprise | Resource PM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        :root { --primary: #6366f1; }
        body { font-family: 'Inter', sans-serif; background: #f8fafc; height: 100vh; overflow: hidden; }
        .app-grid { display: grid; grid-template-columns: 260px 1fr; height: 100vh; }
        .custom-scroll::-webkit-scrollbar { width: 5px; height: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .slide-over { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); transform: translateX(100%); }
        .slide-over.open { transform: translateX(0); }
        .cell-overload { background-color: #fee2e2; color: #ef4444; border: 1px solid #fecaca; }
        .cell-ok { background-color: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
        .kbd { background: #f1f5f9; border: 1px solid #cbd5e1; border-radius: 4px; padding: 2px 5px; font-size: 10px; }
    </style>
</head>
<body class="text-slate-900">

<div class="app-grid">
    <aside class="bg-[#0f172a] text-slate-400 flex flex-col border-r border-slate-800 z-30">
        <div class="p-6 flex items-center gap-3">
            <div class="bg-indigo-600 p-2 rounded-lg text-white"><i class="fas fa-microchip"></i></div>
            <span class="text-white font-bold text-lg tracking-tight">FluxForge <span class="text-[10px] bg-white/10 px-1 rounded ml-1">ENT</span></span>
        </div>

        <nav class="flex-1 px-3 space-y-1 overflow-y-auto custom-scroll">
            <div onclick="setGlobalView('dashboard')" id="nav-dashboard" class="p-3 rounded-lg cursor-pointer flex items-center justify-between hover:bg-slate-800 transition-all">
                <span><i class="fas fa-columns w-5"></i> Dashboard</span>
            </div>
            <div onclick="setGlobalView('projects')" id="nav-projects" class="p-3 rounded-lg cursor-pointer flex items-center justify-between hover:bg-slate-800 transition-all">
                <span><i class="fas fa-layer-group w-5"></i> Projects</span>
            </div>
            <div onclick="setGlobalView('planner')" id="nav-planner" class="p-3 rounded-lg cursor-pointer flex items-center justify-between hover:bg-slate-800 transition-all">
                <span><i class="fas fa-calendar-alt w-5"></i> Resource Planner</span>
            </div>
            
            <div class="pt-6 pb-2 px-3 text-[10px] font-bold text-slate-500 uppercase">Team</div>
            <div id="sidebar-team-list" class="space-y-1 px-3"></div>
        </nav>

        <div class="p-4 border-t border-slate-800">
            <button onclick="addTeamMember()" class="w-full border border-slate-700 text-slate-300 py-2 rounded-lg text-xs hover:bg-slate-800 transition-all mb-2">+ Add Member</button>
            <button onclick="openModal('projectModal')" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-2.5 rounded-lg font-bold text-sm">+ Project</button>
        </div>
    </aside>

    <main class="flex flex-col h-full overflow-hidden">
        <header class="h-14 bg-white border-b border-slate-200 flex items-center justify-between px-6 shrink-0 z-20">
            <div id="breadcrumb" class="flex items-center gap-2 text-sm text-slate-500 font-medium"></div>
            <div class="flex items-center gap-4">
                <span class="text-[10px] font-bold bg-amber-100 text-amber-700 px-2 py-1 rounded">LOCAL DATABASE ACTIVE</span>
            </div>
        </header>

        <div id="project-tabs" class="hidden h-12 bg-white border-b border-slate-200 flex px-6 gap-8 items-end z-20">
            <button onclick="setProjectTab('list')" id="tab-list" class="pb-3 text-sm font-bold border-b-2 border-transparent transition-all">Tasks</button>
            <button onclick="setProjectTab('gantt')" id="tab-gantt" class="pb-3 text-sm font-bold border-b-2 border-transparent transition-all">Gantt</button>
        </div>

        <section id="viewport" class="flex-1 overflow-auto custom-scroll p-8 bg-slate-50/50"></section>
    </main>
</div>

<div id="taskOverlay" class="hidden fixed inset-0 bg-slate-900/20 z-[70]" onclick="closeTaskInspector()"></div>
<div id="taskInspector" class="slide-over fixed right-0 top-0 h-full w-[550px] bg-white z-[80] shadow-2xl flex flex-col">
    </div>

<div id="projectModal" class="hidden fixed inset-0 bg-slate-900/60 z-[90] flex items-center justify-center">
    <div class="bg-white rounded-xl w-full max-w-md p-6">
        <h2 class="text-xl font-bold mb-4">New Project</h2>
        <input id="p-name" type="text" placeholder="Project Name" class="w-full border p-3 rounded-lg mb-4 outline-none focus:ring-2 focus:ring-indigo-500">
        <button onclick="saveProject()" class="w-full bg-indigo-600 text-white py-2.5 rounded-lg font-bold">Create</button>
        <button onclick="closeModal('projectModal')" class="w-full mt-2 text-slate-400 text-sm">Cancel</button>
    </div>
</div>

<script>
    // --- DB INITIALIZATION ---
    let db = JSON.parse(localStorage.getItem('ff_ent_db')) || {
        projects: [],
        users: [
            { id: 1, name: "Sarah Engineer", role: "Frontend", capacity: 8 },
            { id: 2, name: "Mike Dev", role: "Backend", capacity: 8 }
        ]
    };

    let state = { currentView: 'dashboard', currentProjectId: null, currentTab: 'list' };

    const sync = () => { localStorage.setItem('ff_ent_db', JSON.stringify(db)); render(); };

    // --- NAVIGATION ---
    function setGlobalView(v) {
        state.currentView = v;
        state.currentProjectId = null;
        document.getElementById('project-tabs').classList.add('hidden');
        render();
    }

    function openProject(id) {
        state.currentProjectId = id;
        state.currentView = 'project-detail';
        state.currentTab = 'list';
        document.getElementById('project-tabs').classList.remove('hidden');
        render();
    }

    function setProjectTab(t) { state.currentTab = t; render(); }

    // --- RESOURCE PLANNER ENGINE ---
    function renderPlanner() {
        const vp = document.getElementById('viewport');
        const bc = document.getElementById('breadcrumb');
        bc.innerHTML = `<span>Company</span> / <span class="font-bold text-slate-900">Resource Planner</span>`;

        // Create 14 day window
        const days = [];
        const start = new Date();
        for(let i=0; i<14; i++) {
            const d = new Date(start);
            d.setDate(d.getDate() + i);
            days.push(d);
        }

        let html = `
            <div class="mb-6">
                <h2 class="text-2xl font-bold">Team Capacity Planner</h2>
                <p class="text-sm text-slate-500">Visualizing 8hr/day allocation across all active projects.</p>
            </div>
            <div class="bg-white rounded-2xl border shadow-sm overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50 border-b">
                        <tr>
                            <th class="p-4 text-[10px] font-bold text-slate-400 uppercase w-48 border-r">Team Member</th>
                            ${days.map(d => `<th class="p-2 text-center text-[10px] font-bold text-slate-400 uppercase border-r">
                                ${d.toLocaleDateString('en-GB', {weekday: 'short'})}<br>${d.getDate()}/${d.getMonth()+1}
                            </th>`).join('')}
                        </tr>
                    </thead>
                    <tbody>
        `;

        db.users.forEach(user => {
            html += `<tr class="border-b"><td class="p-4 border-r"><p class="font-bold text-sm">${user.name}</p><p class="text-[10px] text-slate-400">${user.role}</p></td>`;
            
            days.forEach(day => {
                const dateStr = day.toISOString().split('T')[0];
                let dailyHours = 0;

                // Calculate load from all projects
                db.projects.forEach(p => {
                    p.tasks.forEach(t => {
                        if(parseInt(t.assignedTo) === user.id) {
                            const tStart = new Date(t.start);
                            const tEnd = new Date(t.end);
                            const checkDay = new Date(dateStr);
                            
                            if(checkDay >= tStart && checkDay <= tEnd) {
                                const duration = Math.max(1, Math.ceil((tEnd - tStart) / (1000*60*60*24)) + 1);
                                dailyHours += (t.estHours || 0) / duration;
                            }
                        }
                    });
                });

                const isOver = dailyHours > user.capacity;
                const isEmpty = dailyHours === 0;
                
                html += `<td class="p-2 border-r text-center">
                    <div class="rounded-lg py-2 text-[10px] font-bold ${isEmpty ? 'text-slate-200' : (isOver ? 'cell-overload' : 'cell-ok')}">
                        ${dailyHours > 0 ? dailyHours.toFixed(1) + 'h' : '-'}
                    </div>
                </td>`;
            });
            html += `</tr>`;
        });

        html += `</tbody></table></div>`;
        vp.innerHTML = html;
    }

    // --- TASK & PROJECT OPS ---
    function updateTask(id, field, val) {
        db.projects.forEach(p => {
            const t = p.tasks.find(x => x.id === id);
            if(t) t[field] = val;
        });
        sync();
    }

    function saveProject() {
        const name = document.getElementById('p-name').value;
        if(!name) return;
        const p = { id: Date.now(), name, tasks: [] };
        db.projects.push(p);
        closeModal('projectModal');
        openProject(p.id);
        sync();
    }

    function addTask() {
        const p = db.projects.find(x => x.id === state.currentProjectId);
        const t = { 
            id: Date.now(), title: "New Task", start: new Date().toISOString().split('T')[0], 
            end: new Date().toISOString().split('T')[0], assignedTo: null, estHours: 0, status: "Todo" 
        };
        p.tasks.push(t);
        sync();
        openTaskInspector(t.id);
    }

    function addTeamMember() {
        const name = prompt("Name:");
        const role = prompt("Role:");
        if(name) {
            db.users.push({ id: Date.now(), name, role, capacity: 8 });
            sync();
        }
    }

    function openTaskInspector(id) {
        const proj = db.projects.find(p => p.tasks.some(t => t.id === id));
        const task = proj.tasks.find(t => t.id === id);
        
        const ins = document.getElementById('taskInspector');
        ins.innerHTML = `
            <div class="p-6 border-b flex justify-between items-center bg-slate-50">
                <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Resource Allocation</span>
                <button onclick="closeTaskInspector()" class="text-slate-400 hover:text-slate-600"><i class="fas fa-times text-xl"></i></button>
            </div>
            <div class="p-8 space-y-6">
                <input type="text" onchange="updateTask(${task.id}, 'title', this.value)" value="${task.title}" class="w-full text-2xl font-bold border-none outline-none focus:text-indigo-600">
                
                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2">Assign to Member</label>
                        <select onchange="updateTask(${task.id}, 'assignedTo', this.value)" class="w-full border rounded-lg p-3 text-sm outline-none focus:ring-2 focus:ring-indigo-500">
                            <option value="">Unassigned</option>
                            ${db.users.map(u => `<option value="${u.id}" ${task.assignedTo == u.id ? 'selected' : ''}>${u.name} (${u.role})</option>`).join('')}
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2">Estimated Total Hours</label>
                        <input type="number" onchange="updateTask(${task.id}, 'estHours', parseFloat(this.value))" value="${task.estHours}" class="w-full border rounded-lg p-3 text-sm">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2">Start Date</label>
                        <input type="date" value="${task.start}" onchange="updateTask(${task.id}, 'start', this.value)" class="w-full border rounded-lg p-3 text-sm">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2">Finish Date</label>
                        <input type="date" value="${task.end}" onchange="updateTask(${task.id}, 'end', this.value)" class="w-full border rounded-lg p-3 text-sm">
                    </div>
                </div>

                <div class="bg-indigo-50 p-4 rounded-xl">
                    <p class="text-[10px] font-bold text-indigo-400 uppercase mb-1">Resource Impact</p>
                    <p class="text-sm text-indigo-700">This task will occupy <strong>${((task.estHours || 0) / (Math.max(1, Math.ceil((new Date(task.end) - new Date(task.start)) / (1000*60*60*24)) + 1))).toFixed(1)} hours per day</strong> of the assigned member's capacity.</p>
                </div>
            </div>
        `;
        document.getElementById('taskOverlay').classList.remove('hidden');
        ins.classList.add('open');
    }

    function closeTaskInspector() { 
        document.getElementById('taskOverlay').classList.add('hidden'); 
        document.getElementById('taskInspector').classList.remove('open'); 
    }

    // --- MASTER RENDER ---
    function render() {
        const vp = document.getElementById('viewport');
        const bc = document.getElementById('breadcrumb');

        document.getElementById('sidebar-team-list').innerHTML = db.users.map(u => `
            <div class="flex items-center gap-2 py-1">
                <div class="w-2 h-2 rounded-full bg-emerald-500"></div>
                <span class="text-xs text-slate-300 font-medium">${u.name}</span>
            </div>
        `).join('');

        if(state.currentView === 'planner') {
            renderPlanner();
            return;
        }

        if(state.currentView === 'dashboard') {
            bc.innerHTML = `<span>Company</span> / <span class="font-bold text-slate-900">Dashboard</span>`;
            vp.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                    <div class="bg-white p-6 rounded-2xl border shadow-sm">
                        <p class="text-[10px] font-bold text-slate-400 uppercase">Active Load</p>
                        <h3 class="text-3xl font-bold">${db.projects.length} Projects</h3>
                    </div>
                    <div onclick="setGlobalView('planner')" class="bg-indigo-600 p-6 rounded-2xl shadow-lg text-white cursor-pointer hover:bg-indigo-700 transition-all">
                        <p class="text-[10px] font-bold opacity-70 uppercase">Team Capacity</p>
                        <h3 class="text-3xl font-bold">Check Planner <i class="fas fa-arrow-right ml-2 text-xl"></i></h3>
                    </div>
                </div>
                <h3 class="font-bold text-slate-800 mb-4">Quick Projects</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    ${db.projects.map(p => `<div onclick="openProject(${p.id})" class="p-4 bg-white border rounded-xl hover:border-indigo-500 cursor-pointer transition-all">
                        <p class="font-bold text-slate-800">${p.name}</p>
                        <p class="text-xs text-slate-400">${p.tasks.length} Active Tasks</p>
                    </div>`).join('')}
                </div>
            `;
        }

        if(state.currentView === 'project-detail') {
            const p = db.projects.find(x => x.id === state.currentProjectId);
            bc.innerHTML = `<span>Projects</span> / <span class="font-bold text-slate-900">${p.name}</span>`;
            
            if(state.currentTab === 'list') {
                vp.innerHTML = `
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-xl font-bold">Task Management</h3>
                        <button onclick="addTask()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg font-bold text-sm">+ Add Task</button>
                    </div>
                    <div class="bg-white rounded-2xl border shadow-sm overflow-hidden">
                        <table class="w-full text-left text-sm">
                            <thead class="bg-slate-50 border-b text-[10px] font-bold text-slate-400 uppercase">
                                <tr>
                                    <th class="px-6 py-4">Item</th>
                                    <th class="px-6 py-4">Assignee</th>
                                    <th class="px-6 py-4">Est Hours</th>
                                    <th class="px-6 py-4">Timeline</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${p.tasks.map(t => `
                                    <tr onclick="openTaskInspector(${t.id})" class="border-b hover:bg-slate-50 cursor-pointer">
                                        <td class="px-6 py-4 font-bold">${t.title}</td>
                                        <td class="px-6 py-4">${db.users.find(u=>u.id==t.assignedTo)?.name || '<span class="text-slate-300 italic">Unassigned</span>'}</td>
                                        <td class="px-6 py-4">${t.estHours}h</td>
                                        <td class="px-6 py-4 text-xs text-slate-500">${t.start} <i class="fas fa-caret-right mx-1"></i> ${t.end}</td>
                                    </tr>
                                `).join('') || '<tr><td colspan="4" class="p-10 text-center text-slate-400">Project is empty.</td></tr>'}
                            </tbody>
                        </table>
                    </div>
                `;
            }
        }
    }

    function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
    function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

    render();
</script>
</body>
</html>
