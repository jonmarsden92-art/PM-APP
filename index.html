<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FluxForge Pro | Enterprise Local PM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        :root { --primary: #3b82f6; --sidebar: #0f172a; }
        body { font-family: 'Inter', sans-serif; background: #f8fafc; height: 100vh; overflow: hidden; }
        
        /* Layout */
        .app-grid { display: grid; grid-template-columns: 260px 1fr; height: 100vh; }
        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* Components */
        .sidebar-item { transition: 0.2s; border-left: 3px solid transparent; }
        .sidebar-item.active { background: #1e293b; border-left-color: var(--primary); color: white; }
        .tab-btn.active { color: var(--primary); border-bottom: 2px solid var(--primary); }
        .task-row:hover .drag-handle { opacity: 1; }
        
        /* Slide Over */
        .slide-over { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); transform: translateX(100%); }
        .slide-over.open { transform: translateX(0); }

        /* Gantt Specifics */
        .gantt-grid { display: grid; grid-template-columns: 250px 1fr; border: 1px solid #e2e8f0; border-radius: 8px; background: white; }
        .gantt-day { width: 40px; border-right: 1px solid #f1f5f9; flex-shrink: 0; text-align: center; font-size: 10px; }
        .gantt-bar { height: 24px; border-radius: 4px; position: absolute; top: 12px; cursor: pointer; transition: filter 0.2s; }
        .gantt-bar:hover { filter: brightness(1.1); }
    </style>
</head>
<body>

<div class="app-grid">
    <aside class="bg-[#0f172a] text-slate-400 flex flex-col border-r border-slate-800">
        <div class="p-6 flex items-center gap-3">
            <div class="bg-blue-600 p-2 rounded-lg text-white"><i class="fas fa-rocket"></i></div>
            <span class="text-white font-bold text-lg tracking-tight">FluxForge Pro</span>
        </div>

        <nav class="flex-1 px-3 space-y-1">
            <p class="px-3 text-[10px] font-bold text-slate-500 uppercase mb-2">Workspace</p>
            <div onclick="setGlobalView('dashboard')" id="nav-dashboard" class="sidebar-item active p-3 rounded-md cursor-pointer flex items-center gap-3"><i class="fas fa-th-large w-4"></i> Dashboard</div>
            <div onclick="setGlobalView('projects')" id="nav-projects" class="sidebar-item p-3 rounded-md cursor-pointer flex items-center gap-3"><i class="fas fa-folder w-4"></i> All Projects</div>
            
            <p class="px-3 text-[10px] font-bold text-slate-500 uppercase mt-6 mb-2">Quick Access</p>
            <div id="sidebar-projects-list" class="space-y-1"></div>
        </nav>

        <div class="p-4 bg-slate-900/50 border-t border-slate-800">
            <button onclick="openProjectModal()" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-2.5 rounded-lg font-semibold text-sm transition-all">+ New Project</button>
            <div class="flex gap-2 mt-2">
                <button onclick="exportData()" class="flex-1 bg-slate-800 text-[10px] py-1 rounded text-slate-300">Backup</button>
                <button onclick="document.getElementById('importInput').click()" class="flex-1 bg-slate-800 text-[10px] py-1 rounded text-slate-300">Restore</button>
                <input type="file" id="importInput" class="hidden" onchange="importData(event)">
            </div>
        </div>
    </aside>

    <main class="flex flex-col h-full overflow-hidden">
        <header class="h-14 bg-white border-b border-slate-200 flex items-center justify-between px-6 shrink-0">
            <div id="breadcrumb" class="flex items-center gap-2 text-sm text-slate-500 font-medium"></div>
            <div class="flex items-center gap-4">
                <div class="flex -space-x-2">
                    <div class="w-7 h-7 rounded-full bg-indigo-500 border-2 border-white flex items-center justify-center text-[10px] text-white font-bold">JD</div>
                    <div class="w-7 h-7 rounded-full bg-emerald-500 border-2 border-white flex items-center justify-center text-[10px] text-white font-bold">AS</div>
                </div>
            </div>
        </header>

        <div id="project-tabs" class="hidden h-12 bg-white border-b border-slate-200 flex px-6 gap-8 items-end">
            <button onclick="setProjectTab('list')" id="tab-list" class="tab-btn active pb-3 text-sm font-bold transition-all">List</button>
            <button onclick="setProjectTab('board')" id="tab-board" class="tab-btn pb-3 text-sm font-bold text-slate-400 transition-all">Board</button>
            <button onclick="setProjectTab('gantt')" id="tab-gantt" class="tab-btn pb-3 text-sm font-bold text-slate-400 transition-all">Gantt</button>
        </div>

        <section id="viewport" class="flex-1 overflow-auto custom-scroll p-6 bg-slate-50/50"></section>
    </main>
</div>

<div id="projectModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[60] flex items-center justify-center">
    <div class="bg-white rounded-xl w-full max-w-md shadow-2xl p-6">
        <h2 class="text-xl font-bold text-slate-800 mb-4">Create Project</h2>
        <div class="space-y-4">
            <input id="p-name" type="text" placeholder="Project Name" class="w-full border p-3 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
            <textarea id="p-desc" placeholder="Brief description..." class="w-full border p-3 rounded-lg h-24 outline-none"></textarea>
            <div class="flex gap-3">
                <button onclick="closeModal('projectModal')" class="flex-1 py-2 font-bold text-slate-500">Cancel</button>
                <button onclick="saveProject()" class="flex-1 bg-blue-600 text-white py-2 rounded-lg font-bold">Create Project</button>
            </div>
        </div>
    </div>
</div>

<div id="taskOverlay" class="hidden fixed inset-0 bg-slate-900/20 z-[70]" onclick="closeTaskInspector()"></div>
<div id="taskInspector" class="slide-over fixed right-0 top-0 h-full w-[450px] bg-white z-[80] shadow-2xl flex flex-col">
    </div>

<script>
    // --- DATABASE MOCKUP & LOGIC ---
    let db = JSON.parse(localStorage.getItem('ff_pro_db')) || {
        projects: [],
        users: ["John Doe", "Alice Smith", "Ryan King", "Unassigned"]
    };

    let state = {
        currentView: 'dashboard',
        currentProjectId: null,
        currentTab: 'list',
        selectedTaskId: null
    };

    const save = () => {
        localStorage.setItem('ff_pro_db', JSON.stringify(db));
        render();
    };

    // --- NAVIGATION ---
    function setGlobalView(view) {
        state.currentView = view;
        state.currentProjectId = null;
        document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
        document.getElementById(`nav-${view}`).classList.add('active');
        document.getElementById('project-tabs').classList.add('hidden');
        render();
    }

    function openProject(id) {
        state.currentProjectId = id;
        state.currentView = 'project-detail';
        document.getElementById('project-tabs').classList.remove('hidden');
        render();
    }

    function setProjectTab(tab) {
        state.currentTab = tab;
        render();
    }

    // --- PROJECT CRUD ---
    function saveProject() {
        const name = document.getElementById('p-name').value;
        const desc = document.getElementById('p-desc').value;
        if(!name) return;
        const newProj = { id: Date.now(), name, desc, tasks: [], created: new Date() };
        db.projects.push(newProj);
        closeModal('projectModal');
        openProject(newProj.id);
        save();
    }

    // --- TASK CRUD ---
    function addTask() {
        const proj = db.projects.find(p => p.id === state.currentProjectId);
        const newTask = {
            id: Date.now(),
            title: "Untitled Task",
            desc: "",
            status: "Todo",
            priority: "Medium",
            assignee: "Unassigned",
            start: new Date().toISOString().split('T')[0],
            end: new Date(Date.now() + 86400000 * 7).toISOString().split('T')[0],
            progress: 0
        };
        proj.tasks.push(newTask);
        save();
        openTaskInspector(newTask.id);
    }

    function updateTask(id, field, value) {
        const proj = db.projects.find(p => p.id === state.currentProjectId);
        const task = proj.tasks.find(t => t.id === id);
        task[field] = value;
        save();
    }

    function deleteTask(id) {
        const proj = db.projects.find(p => p.id === state.currentProjectId);
        proj.tasks = proj.tasks.filter(t => t.id !== id);
        closeTaskInspector();
        save();
    }

    // --- UI COMPONENTS ---
    function openTaskInspector(id) {
        state.selectedTaskId = id;
        const proj = db.projects.find(p => p.id === state.currentProjectId);
        const task = proj.tasks.find(t => t.id === id);
        const inspector = document.getElementById('taskInspector');
        
        inspector.innerHTML = `
            <div class="p-6 border-b flex justify-between items-center bg-slate-50">
                <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Task Details</span>
                <button onclick="closeTaskInspector()" class="text-slate-400 hover:text-slate-600"><i class="fas fa-times"></i></button>
            </div>
            <div class="flex-1 overflow-y-auto p-6 space-y-6">
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Title</label>
                    <input type="text" onchange="updateTask(${task.id}, 'title', this.value)" value="${task.title}" class="w-full text-xl font-bold outline-none focus:text-blue-600">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Assignee</label>
                        <select onchange="updateTask(${task.id}, 'assignee', this.value)" class="w-full border border-slate-200 rounded-lg p-2 text-sm">
                            ${db.users.map(u => `<option ${task.assignee === u ? 'selected' : ''}>${u}</option>`).join('')}
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Priority</label>
                        <select onchange="updateTask(${task.id}, 'priority', this.value)" class="w-full border border-slate-200 rounded-lg p-2 text-sm">
                            <option ${task.priority === 'High' ? 'selected' : ''}>High</option>
                            <option ${task.priority === 'Medium' ? 'selected' : ''}>Medium</option>
                            <option ${task.priority === 'Low' ? 'selected' : ''}>Low</option>
                        </select>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Start Date</label>
                        <input type="date" onchange="updateTask(${task.id}, 'start', this.value)" value="${task.start}" class="w-full border border-slate-200 rounded-lg p-2 text-sm">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Due Date</label>
                        <input type="date" onchange="updateTask(${task.id}, 'end', this.value)" value="${task.end}" class="w-full border border-slate-200 rounded-lg p-2 text-sm">
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Description</label>
                    <textarea onchange="updateTask(${task.id}, 'desc', this.value)" class="w-full border border-slate-200 rounded-lg p-3 text-sm h-32">${task.desc}</textarea>
                </div>
            </div>
            <div class="p-6 border-t bg-slate-50 flex justify-between items-center">
                <button onclick="deleteTask(${task.id})" class="text-red-500 text-sm font-bold"><i class="fas fa-trash mr-1"></i> Delete</button>
                <div class="flex items-center gap-2">
                    <span class="text-xs font-bold text-slate-500">Progress</span>
                    <input type="number" onchange="updateTask(${task.id}, 'progress', this.value)" value="${task.progress}" class="w-16 border rounded p-1 text-center font-bold">
                </div>
            </div>
        `;
        
        document.getElementById('taskOverlay').classList.remove('hidden');
        inspector.classList.add('open');
    }

    function closeTaskInspector() {
        document.getElementById('taskOverlay').classList.add('hidden');
        document.getElementById('taskInspector').classList.remove('open');
    }

    // --- RENDERING VIEWS ---
    function render() {
        const vp = document.getElementById('viewport');
        const bc = document.getElementById('breadcrumb');
        
        // Update Sidebar Projects
        document.getElementById('sidebar-projects-list').innerHTML = db.projects.slice(0, 5).map(p => `
            <div onclick="openProject(${p.id})" class="p-2 px-3 text-sm rounded cursor-pointer hover:bg-slate-800 transition-colors ${state.currentProjectId === p.id ? 'text-white font-bold' : ''}">
                <i class="fas fa-circle text-[8px] mr-2 text-blue-500"></i> ${p.name}
            </div>
        `).join('');

        if (state.currentView === 'dashboard') {
            bc.innerHTML = `<span>Workspace</span> / <span class="text-slate-900 font-bold">Dashboard</span>`;
            vp.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                    <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                        <p class="text-[10px] font-bold text-slate-400 uppercase">Active Projects</p>
                        <h2 class="text-3xl font-bold">${db.projects.length}</h2>
                    </div>
                    <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                        <p class="text-[10px] font-bold text-slate-400 uppercase">Total Tasks</p>
                        <h2 class="text-3xl font-bold text-blue-600">${db.projects.reduce((a,b)=>a+b.tasks.length,0)}</h2>
                    </div>
                </div>
                <h3 class="font-bold text-slate-800 mb-4">Recent Activity</h3>
                <div class="bg-white rounded-xl border p-4 text-slate-400 text-center py-10 italic">
                    All data is stored locally in your browser storage.
                </div>
            `;
        }

        if (state.currentView === 'projects') {
            bc.innerHTML = `<span>Workspace</span> / <span class="text-slate-900 font-bold">All Projects</span>`;
            vp.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    ${db.projects.map(p => `
                        <div onclick="openProject(${p.id})" class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm hover:border-blue-500 transition-all cursor-pointer group">
                            <h4 class="font-bold text-slate-800 group-hover:text-blue-600 transition-colors">${p.name}</h4>
                            <p class="text-sm text-slate-500 mt-2 mb-4 line-clamp-2">${p.desc || 'No description...'}</p>
                            <div class="flex items-center justify-between mt-auto">
                                <span class="text-[10px] font-bold bg-slate-100 px-2 py-1 rounded text-slate-500">${p.tasks.length} Tasks</span>
                                <i class="fas fa-arrow-right text-slate-300 group-hover:translate-x-1 transition-transform"></i>
                            </div>
                        </div>
                    `).join('') || '<p class="text-slate-400">No projects yet.</p>'}
                </div>
            `;
        }

        if (state.currentView === 'project-detail') {
            const p = db.projects.find(x => x.id === state.currentProjectId);
            bc.innerHTML = `<span>Projects</span> / <span class="text-slate-900 font-bold">${p.name}</span>`;
            
            // Tab Toggle
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active', 'text-blue-600');
                btn.classList.add('text-slate-400');
            });
            document.getElementById(`tab-${state.activeTab || 'list'}`).classList.add('active', 'text-blue-600');

            if (state.currentTab === 'list') {
                vp.innerHTML = `
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="font-bold text-slate-800 text-lg">Work Items</h3>
                        <button onclick="addTask()" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold text-sm hover:bg-blue-700 transition-all">+ Add Task</button>
                    </div>
                    <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                        <table class="w-full text-left text-sm">
                            <thead class="bg-slate-50 border-b border-slate-100 text-[10px] font-bold uppercase text-slate-400">
                                <tr>
                                    <th class="px-6 py-4">Title</th>
                                    <th class="px-6 py-4">Assignee</th>
                                    <th class="px-6 py-4">Status</th>
                                    <th class="px-6 py-4">Timeline</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-50">
                                ${p.tasks.map(t => `
                                    <tr onclick="openTaskInspector(${t.id})" class="hover:bg-slate-50 cursor-pointer transition-all task-row">
                                        <td class="px-6 py-4">
                                            <div class="font-bold text-slate-800">${t.title}</div>
                                        </td>
                                        <td class="px-6 py-4 text-slate-500">${t.assignee}</td>
                                        <td class="px-6 py-4">
                                            <span class="px-2 py-0.5 rounded-full bg-blue-50 text-blue-600 text-[10px] font-bold">${t.status}</span>
                                        </td>
                                        <td class="px-6 py-4 text-slate-400 text-xs font-medium">
                                            ${t.start} <i class="fas fa-arrow-right mx-1 text-[8px]"></i> ${t.end}
                                        </td>
                                    </tr>
                                `).join('') || '<tr><td colspan="4" class="py-10 text-center text-slate-400 italic">No tasks created yet.</td></tr>'}
                            </tbody>
                        </table>
                    </div>
                `;
            }

            if (state.currentTab === 'gantt') {
                renderGantt(p);
            }
        }
    }

    function renderGantt(project) {
        const vp = document.getElementById('viewport');
        if(!project.tasks.length) {
            vp.innerHTML = `<div class="p-10 text-center text-slate-400">Add tasks with dates to see the timeline.</div>`;
            return;
        }

        const dates = project.tasks.map(t => [new Date(t.start), new Date(t.end)]).flat();
        const minDate = new Date(Math.min(...dates));
        const maxDate = new Date(Math.max(...dates));
        maxDate.setDate(maxDate.getDate() + 10); // Add buffer

        const diffDays = Math.ceil((maxDate - minDate) / (1000 * 60 * 60 * 24));
        const dayWidth = 40;

        let dateHeader = "";
        for(let i=0; i<diffDays; i++) {
            const d = new Date(minDate);
            d.setDate(d.getDate() + i);
            dateHeader += `<div class="gantt-day h-10 flex items-center justify-center border-b font-bold ${d.getDay() === 0 || d.getDay() === 6 ? 'bg-slate-50' : ''}">${d.getDate()}</div>`;
        }

        vp.innerHTML = `
            <div class="gantt-grid shadow-sm rounded-lg overflow-hidden">
                <div class="bg-slate-50 border-r border-slate-200">
                    <div class="h-10 border-b flex items-center px-4 text-[10px] font-bold text-slate-400 uppercase">Task List</div>
                    ${project.tasks.map(t => `<div class="h-12 border-b flex items-center px-4 font-bold text-xs truncate bg-white">${t.title}</div>`).join('')}
                </div>
                <div class="overflow-x-auto custom-scroll bg-white">
                    <div class="flex bg-slate-50" style="width: ${diffDays * dayWidth}px">${dateHeader}</div>
                    <div class="relative" style="width: ${diffDays * dayWidth}px">
                        ${project.tasks.map(t => {
                            const taskStart = new Date(t.start);
                            const taskEnd = new Date(t.end);
                            const left = Math.ceil((taskStart - minDate) / (1000 * 60 * 60 * 24)) * dayWidth;
                            const width = (Math.ceil((taskEnd - taskStart) / (1000 * 60 * 60 * 24)) + 1) * dayWidth;
                            return `
                                <div class="h-12 border-b relative">
                                    <div onclick="openTaskInspector(${t.id})" 
                                         class="gantt-bar bg-blue-500 shadow-sm flex items-center px-2 text-[8px] text-white font-bold truncate overflow-hidden" 
                                         style="left: ${left}px; width: ${width}px">
                                        ${t.progress}%
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            </div>
        `;
    }

    // --- UTILS ---
    function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
    function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

    function exportData() {
        const blob = new Blob([JSON.stringify(db)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `FluxForge_Backup_${new Date().toISOString().split('T')[0]}.json`;
        a.click();
    }

    function importData(event) {
        const reader = new FileReader();
        reader.onload = (e) => {
            db = JSON.parse(e.target.result);
            save();
            location.reload();
        };
        reader.readAsText(event.target.files[0]);
    }

    function openProjectModal() {
        document.getElementById('p-name').value = "";
        document.getElementById('p-desc').value = "";
        openModal('projectModal');
    }

    // Initialize
    render();
</script>
</body>
</html>
