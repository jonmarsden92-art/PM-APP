<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FluxForge</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { font-family: system-ui; }
  </style>
</head>

<body class="bg-gray-100">

<div class="flex min-h-screen">

  <!-- Sidebar -->
  <aside class="w-64 bg-gray-900 text-white p-4">
    <h1 class="text-xl font-bold mb-6">FluxForge</h1>

    <nav class="space-y-2">
      <button onclick="app.showDashboard()" class="block w-full text-left px-3 py-2 hover:bg-gray-700 rounded">Dashboard</button>
      <button onclick="app.showProjects()" class="block w-full text-left px-3 py-2 hover:bg-gray-700 rounded">Projects</button>
    </nav>

    <button onclick="app.openNewProject()" class="mt-6 w-full bg-blue-500 py-2 rounded">
      + New Project
    </button>
  </aside>

  <!-- Main -->
  <main class="flex-1 p-6">

    <h1 id="page-title" class="text-2xl font-bold mb-6">Dashboard</h1>

    <div id="content"></div>

  </main>

</div>

<!-- Modal -->
<div id="modal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center">
  <div class="bg-white p-6 rounded w-96">
    <h2 class="text-lg font-bold mb-4">New Project</h2>

    <input id="project-name" placeholder="Project name"
           class="w-full border p-2 mb-4"/>

    <div class="flex justify-end gap-2">
      <button onclick="app.closeModal()">Cancel</button>
      <button onclick="app.saveProject()" class="bg-blue-500 text-white px-4 py-2 rounded">Save</button>
    </div>
  </div>
</div>

<script src="app.js"></script>

</body>
</html>
