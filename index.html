<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FluxForge | Local-First Teamwork</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; background: #f8fafc; }
        .sidebar-link.active { background: #1e293b; color: #f1f5f9; border-right: 4px solid #6366f1; }
        .project-card:hover { border-color: #6366f1; transform: translateY(-2px); }
        .tab-btn.active { border-bottom: 2px solid #6366f1; color: #6366f1; }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="flex">

    <aside class="w-64 bg-slate-900 h-full flex flex-col text-slate-400">
        <div class="p-6 text-white font-bold text-xl flex items-center gap-2">
            <div class="bg-indigo-600 p-1.5 rounded-lg"><i class="fas fa-cubes"></i></div>
            FluxForge
        </div>
        
        <nav class="flex-1 px-3 space-y-1">
            <button onclick="changeGlobalView('home')" id="nav-home" class="sidebar-link active w-full flex items-center gap-3 p-3 rounded-lg transition-all">
                <i class="fas fa-home"></i> Home
            </button>
            <button onclick="changeGlobalView('projects')" id="nav-projects" class="sidebar-link w-full flex items-center gap-3 p-3 rounded-lg transition-all">
                <i class="fas fa-briefcase"></i> My Projects
            </button>
        </nav>

        <div class="p-4 border-t border-slate-800">
            <button onclick="openModal('newProjectModal')" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-2.5 rounded-lg font-medium flex items-center justify-center gap-2 transition-all">
                <i class="fas fa-plus"></i> New Project
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-hidden">
        <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8 shrink-0">
            <h2 id="current-view-title" class="font-bold text-slate-800 text-lg">Dashboard</h2>
            <div class="flex items-center gap-4">
                <span class="text-xs font-semibold bg-slate-100 text-slate-500 px-2 py-1 rounded">LOCAL STORAGE ACTIVE</span>
                <div class="w-8 h-8 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center font-bold text-xs">U</div>
            </div>
        </header>

        <section id="main-viewport" class="flex-1 p-8 overflow-y-auto custom-scroll">
            </section>
    </main>

    <div id="newProjectModal" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl w-full max-w-md shadow-2xl p-6">
            <h3 class="text-xl font-bold mb-4">Create New Project</h3>
            <input id="p-name" type="text" placeholder="Project Name" class="w-full border p-3 rounded-lg mb-4 outline-none focus:ring-2 focus:ring-indigo-500">
            <textarea id="p-desc" placeholder="Project Description" class="w-full border p-3 rounded-lg mb-4 outline-none h-24"></textarea>
            <div class="flex gap-3">
                <button onclick="closeModal('newProjectModal')" class="flex-1 bg-slate-100 py-2 rounded-lg font-medium">Cancel</button>
                <button onclick="saveNewProject()" class="flex-1 bg-indigo-600 text-white py-2 rounded-lg font-medium">Create</button>
            </div>
        </div>
    </div>

    <script>
        // DATA LAYER
        let state = JSON.parse(localStorage.getItem('flux_state')) || {
            projects: [],
            currentProject: null,
            view: 'home'
        };

        function sync() {
            localStorage.setItem('flux_state', JSON.stringify(state));
            render();
        }

        // NAVIGATION
        function changeGlobalView(view) {
            state.view = view;
            state.currentProject = null;
            document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
            document.getElementById(`nav-${view}`).classList.add('active');
            sync();
        }

        function openProject(id) {
            state.currentProject = id;
            state.view = 'project-detail';
            state.projectTab = 'tasks';
            sync();
        }

        // PROJECT ACTIONS
        function saveNewProject() {
            const name = document.getElementById('p-name').value;
            const desc = document.getElementById('p-desc').value;
            if(!name) return alert("Name required");

            const newProj = {
                id: Date.now(),
                name,
                desc,
                tasks: [],
                status: 'Active',
                created: new Date().toLocaleDateString()
            };

            state.projects.push(newProj);
            closeModal('newProjectModal');
            sync();
        }

        function addTask(projectId) {
            const title = prompt("Enter task title:");
            if(!title) return;
            const project = state.projects.find(p => p.id === projectId);
            project.tasks.push({
                id: Date.now(),
                title,
                status: 'todo',
                priority: 'Medium'
            });
            sync();
        }

        function updateTaskStatus(projectId, taskId, status) {
            const project = state.projects.find(p => p.id === projectId);
            const task = project.tasks.find(t => t.id === taskId);
            task.status = status;
            sync();
        }

        // UI HELPERS
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        // RENDER ENGINE
        function render() {
            const viewport = document.getElementById('main-viewport');
            const title = document.getElementById('current-view-title');

            if (state.view === 'home') {
                title.innerText = "Dashboard Overview";
                viewport.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                        <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                            <p class="text-slate-500 text-sm font-semibold uppercase">Total Projects</p>
                            <h3 class="text-3xl font-bold text-slate-800">${state.projects.length}</h3>
                        </div>
                        <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                            <p class="text-slate-500 text-sm font-semibold uppercase">Active Tasks</p>
                            <h3 class="text-3xl font-bold text-indigo-600">${state.projects.reduce((a,p)=>a+p.tasks.filter(t=>t.status!=='done').length,0)}</h3>
                        </div>
                        <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                            <p class="text-slate-500 text-sm font-semibold uppercase">Completed</p>
                            <h3 class="text-3xl font-bold text-emerald-500">${state.projects.reduce((a,p)=>a+p.tasks.filter(t=>t.status==='done').length,0)}</h3>
                        </div>
                    </div>
                `;
            }

            if (state.view === 'projects') {
                title.innerText = "All Projects";
                viewport.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        ${state.projects.map(p => `
                            <div onclick="openProject(${p.id})" class="project-card bg-white p-6 rounded-xl border border-slate-200 shadow-sm cursor-pointer transition-all">
                                <div class="flex justify-between items-start mb-4">
                                    <h4 class="font-bold text-slate-800">${p.name}</h4>
                                    <span class="text-[10px] bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded-full font-bold">${p.status}</span>
                                </div>
                                <p class="text-sm text-slate-500 mb-6 line-clamp-2">${p.desc || 'No description provided.'}</p>
                                <div class="flex items-center justify-between border-t pt-4">
                                    <span class="text-xs text-slate-400"><i class="far fa-calendar mr-1"></i> ${p.created}</span>
                                    <span class="text-xs font-bold text-indigo-600">${p.tasks.length} Tasks</span>
                                </div>
                            </div>
                        `).join('') || '<div class="col-span-full text-center py-20 text-slate-400">No projects yet. Create one to get started!</div>'}
                    </div>
                `;
            }

            if (state.view === 'project-detail') {
                const p = state.projects.find(x => x.id === state.currentProject);
                title.innerText = p.name;
                viewport.innerHTML = `
                    <div class="flex gap-8 border-b border-slate-200 mb-6">
                        <button class="tab-btn active pb-3 font-semibold text-sm px-2">Task List</button>
                        <button class="tab-btn pb-3 font-semibold text-sm px-2 text-slate-400">Kanban</button>
                        <button class="tab-btn pb-3 font-semibold text-sm px-2 text-slate-400">Messages</button>
                    </div>
                    
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="font-bold text-slate-700">Project Tasks</h3>
                        <button onclick="addTask(${p.id})" class="text-sm bg-indigo-50 text-indigo-600 px-4 py-2 rounded-lg font-bold hover:bg-indigo-100">
                            + Add Task
                        </button>
                    </div>

                    <div class="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm">
                        <table class="w-full text-left text-sm">
                            <thead class="bg-slate-50 border-b border-slate-200 text-slate-500 uppercase text-[11px] font-bold">
                                <tr>
                                    <th class="px-6 py-3">Task Name</th>
                                    <th class="px-6 py-3">Status</th>
                                    <th class="px-6 py-3">Priority</th>
                                    <th class="px-6 py-3 text-right">Actions</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-100">
                                ${p.tasks.map(t => `
                                    <tr class="hover:bg-slate-50">
                                        <td class="px-6 py-4 font-medium text-slate-800">${t.title}</td>
                                        <td class="px-6 py-4">
                                            <select onchange="updateTaskStatus(${p.id}, ${t.id}, this.value)" class="bg-transparent outline-none cursor-pointer font-semibold ${t.status === 'done' ? 'text-emerald-500' : 'text-amber-500'}">
                                                <option value="todo" ${t.status === 'todo' ? 'selected' : ''}>To Do</option>
                                                <option value="doing" ${t.status === 'doing' ? 'selected' : ''}>Doing</option>
                                                <option value="done" ${t.status === 'done' ? 'selected' : ''}>Done</option>
                                            </select>
                                        </td>
                                        <td class="px-6 py-4">
                                            <span class="px-2 py-1 rounded bg-slate-100 text-slate-600 text-[10px] font-bold">${t.priority}</span>
                                        </td>
                                        <td class="px-6 py-4 text-right">
                                            <button class="text-slate-300 hover:text-red-500"><i class="fas fa-trash"></i></button>
                                        </td>
                                    </tr>
                                `).join('') || '<tr><td colspan="4" class="text-center py-10 text-slate-400">No tasks yet.</td></tr>'}
                            </tbody>
                        </table>
                    </div>
                `;
            }
        }

        // INITIAL LOAD
        render();
    </script>
</body>
</html>
