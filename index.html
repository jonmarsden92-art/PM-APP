<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FluxForge Pro</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: system-ui; }
.nav { padding:10px; border-radius:6px; cursor:pointer; }
.nav:hover { background:#374151; }
.active { background:#4f46e5; }
.card { background:white; padding:16px; border-radius:8px; box-shadow:0 2px 6px rgba(0,0,0,0.1); }
.column { min-height:300px; background:#f3f4f6; padding:10px; border-radius:8px; }
.task { background:white; padding:8px; border-radius:6px; margin-bottom:8px; cursor:grab; }
.bar { height:14px; background:#6366f1; border-radius:4px; }
</style>
</head>

<body class="bg-gray-100">

<div class="flex min-h-screen">

<!-- SIDEBAR -->
<aside class="w-64 bg-gray-900 text-white p-4 flex flex-col">
  <h1 class="text-xl font-bold mb-6">FluxForge</h1>

  <div class="space-y-2">
    <div id="nav-dashboard" class="nav" onclick="nav('dashboard')">Dashboard</div>
    <div id="nav-projects" class="nav" onclick="nav('projects')">Projects</div>
    <div id="nav-kanban" class="nav" onclick="nav('kanban')">Kanban</div>
    <div id="nav-gantt" class="nav" onclick="nav('gantt')">Gantt</div>
  </div>

  <button onclick="openModal()" class="mt-auto bg-indigo-600 py-2 rounded">
    + New Project
  </button>
</aside>

<!-- MAIN -->
<main class="flex-1 p-6">
  <h1 id="title" class="text-2xl font-bold mb-6"></h1>
  <div id="content"></div>
</main>

</div>

<!-- MODAL -->
<div id="modal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center">
  <div class="bg-white p-6 rounded w-96">
    <h2 class="font-bold mb-4">New Project</h2>

    <input id="name" class="w-full border p-2 mb-3" placeholder="Name">
    <textarea id="desc" class="w-full border p-2 mb-3" placeholder="Description"></textarea>

    <div class="flex justify-end gap-2">
      <button onclick="closeModal()">Cancel</button>
      <button onclick="saveProject()" class="bg-indigo-600 text-white px-4 py-2 rounded">Save</button>
    </div>
  </div>
</div>

<script>
let projects = [];
let view = "dashboard";
let currentProject = null;

/* INIT */
window.onload = () => {
  load();
  render();
};

/* STORAGE */
function load(){
  const d = localStorage.getItem("fluxforge_full");
  if(d) projects = JSON.parse(d);
}
function save(){
  localStorage.setItem("fluxforge_full", JSON.stringify(projects));
}

/* NAV */
function nav(v){
  view = v;
  render();
}

/* RENDER */
function render(){
  setActive();

  if(view==="dashboard") dashboard();
  if(view==="projects") projectsView();
  if(view==="project") projectView();
  if(view==="kanban") kanbanView();
  if(view==="gantt") ganttView();
}

/* NAV UI */
function setActive(){
  ["dashboard","projects","kanban","gantt"].forEach(n=>{
    document.getElementById("nav-"+n).classList.remove("active");
  });
  document.getElementById("nav-"+view)?.classList.add("active");
}

/* DASHBOARD */
function dashboard(){
  setTitle("Dashboard");
  setContent(`
    <div class="grid grid-cols-3 gap-4">
      <div class="card">Projects: ${projects.length}</div>
      <div class="card">Tasks: ${projects.reduce((a,p)=>a+p.tasks.length,0)}</div>
      <div class="card">Status: Active</div>
    </div>
  `);
}

/* PROJECTS */
function projectsView(){
  setTitle("Projects");

  if(!projects.length){
    setContent("<p>No projects yet</p>");
    return;
  }

  setContent(`
    <div class="grid gap-4">
      ${projects.map(p=>`
        <div class="card">
          <h3 class="font-bold">${p.name}</h3>
          <p>${p.desc}</p>
          <button onclick="openProject('${p.id}')" class="text-indigo-600 mt-2">Open</button>
        </div>
      `).join("")}
    </div>
  `);
}

function openProject(id){
  currentProject = id;
  view="project";
  render();
}

/* PROJECT DETAIL */
function projectView(){
  const p = projects.find(x=>x.id===currentProject);

  setTitle(p.name);

  setContent(`
    <input id="taskInput" class="border p-2 mb-3" placeholder="New task">
    <button onclick="addTask()" class="bg-indigo-600 text-white px-3 py-1 rounded">Add</button>

    <div class="mt-4 space-y-2">
      ${p.tasks.map(t=>`
        <div class="card">
          <input value="${t.title}" onchange="updateTask('${t.id}','title',this.value)" class="border p-1 w-full mb-2"/>
          <div class="flex gap-2">
            <input type="date" value="${t.start}" onchange="updateTask('${t.id}','start',this.value)">
            <input type="date" value="${t.end}" onchange="updateTask('${t.id}','end',this.value)">
          </div>
        </div>
      `).join("")}
    </div>
  `);
}

/* TASK */
function addTask(){
  const val = document.getElementById("taskInput").value;
  if(!val) return;

  const p = projects.find(x=>x.id===currentProject);

  p.tasks.push({
    id: Date.now(),
    title: val,
    status: "todo",
    start: new Date().toISOString().slice(0,10),
    end: new Date(Date.now()+86400000).toISOString().slice(0,10)
  });

  save();
  projectView();
}

function updateTask(id,field,value){
  const p = projects.find(x=>x.id===currentProject);
  const t = p.tasks.find(x=>x.id==id);
  t[field]=value;
  save();
}

/* KANBAN */
let dragged = null;

function kanbanView(){
  setTitle("Kanban");

  const tasks = projects.flatMap(p=>p.tasks);

  setContent(`
    <div class="grid grid-cols-3 gap-4">
      ${["todo","doing","done"].map(s=>`
        <div class="column" ondragover="event.preventDefault()" ondrop="drop('${s}')">
          <h3>${s}</h3>
          ${tasks.filter(t=>t.status===s).map(t=>`
            <div class="task" draggable="true" ondragstart="drag('${t.id}')">${t.title}</div>
          `).join("")}
        </div>
      `).join("")}
    </div>
  `);
}

function drag(id){ dragged=id; }

function drop(status){
  projects.forEach(p=>{
    p.tasks.forEach(t=>{
      if(t.id==dragged) t.status=status;
    });
  });
  save();
  kanbanView();
}

/* GANTT */
function ganttView(){
  setTitle("Gantt");

  const tasks = projects.flatMap(p=>p.tasks);
  if(!tasks.length){
    setContent("<p>No tasks</p>");
    return;
  }

  const start = new Date(Math.min(...tasks.map(t=>new Date(t.start))));
  const end = new Date(Math.max(...tasks.map(t=>new Date(t.end))));
  const dayMs = 86400000;

  setContent(`
    <div class="space-y-3">
      ${tasks.map(t=>{
        const offset = (new Date(t.start)-start)/dayMs;
        const duration = (new Date(t.end)-new Date(t.start))/dayMs + 1;

        return `
          <div>
            <div class="text-sm">${t.title}</div>
            <div class="bg-gray-200 h-4 relative rounded">
              <div class="bar absolute"
                   style="left:${offset*20}px;width:${duration*20}px"></div>
            </div>
          </div>
        `;
      }).join("")}
    </div>
  `);
}

/* MODAL */
function openModal(){ document.getElementById("modal").classList.remove("hidden"); }
function closeModal(){ document.getElementById("modal").classList.add("hidden"); }

/* CREATE PROJECT */
function saveProject(){
  const name = document.getElementById("name").value;
  const desc = document.getElementById("desc").value;

  if(!name) return;

  projects.push({
    id: Date.now().toString(),
    name,
    desc,
    tasks:[]
  });

  save();
  closeModal();
  nav("projects");
}

/* UTILS */
function setTitle(t){ document.getElementById("title").innerText=t; }
function setContent(h){ document.getElementById("content").innerHTML=h; }

</script>

</body>
</html>
