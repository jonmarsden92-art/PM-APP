<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FluxForge OS | Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; height: 100vh; overflow: hidden; }
        .sidebar-item.active { background: #1e293b; color: #6366f1; border-right: 4px solid #6366f1; }
        .tab-active { border-bottom: 2px solid #6366f1; color: #6366f1; }
        .gantt-row:hover { background: rgba(99, 102, 241, 0.05); }
        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .slide-over { transition: transform 0.3s ease-in-out; }
    </style>
</head>
<body class="flex">

    <aside class="w-64 bg-slate-900 text-slate-400 flex flex-col shrink-0">
        <div class="p-6 text-white font-bold text-xl flex items-center gap-3">
            <div class="bg-indigo-600 p-2 rounded-lg"><i class="fas fa-project-diagram"></i></div>
            FluxForge
        </div>
        <nav class="flex-1 px-4 space-y-1">
            <div onclick="setView('home')" id="nav-home" class="sidebar-item active p-3 rounded-lg cursor-pointer flex items-center gap-3"><i class="fas fa-home"></i> Dashboard</div>
            <div onclick="setView('projects')" id="nav-projects" class="sidebar-item p-3 rounded-lg cursor-pointer flex items-center gap-3"><i class="fas fa-tasks"></i> Projects</div>
        </nav>
        <div class="p-4 border-t border-slate-800">
            <button onclick="openModal('newProjectModal')" class="w-full bg-indigo-600 text-white py-2 rounded-lg font-bold hover:bg-indigo-500 transition-colors">+ Project</button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 bg-white border-b flex items-center justify-between px-8 shrink-0">
            <h2 id="view-title" class="font-bold text-slate-800 uppercase tracking-wider text-sm">Overview</h2>
            <div id="project-tabs" class="hidden flex gap-6 h-full items-center">
                <button onclick="setProjectTab('list')" id="tab-list" class="tab-active h-full px-2 text-sm font-bold">List</button>
                <button onclick="setProjectTab('gantt')" id="tab-gantt" class="h-full px-2 text-sm font-bold text-slate-400">Gantt</button>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right"><p class="text-xs font-bold">Admin User</p><p class="text-[10px] text-slate-400">Local Session</p></div>
                <div class="w-10 h-10 rounded-full bg-slate-200 border-2 border-white"></div>
            </div>
        </header>

        <section id="viewport" class="flex-1 overflow-auto custom-scroll p-8"></section>
    </main>

    <div id="taskOverlay" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-40" onclick="closeTaskDetail()"></div>
    <div id="taskDetail" class="fixed right-0 top-0 h-full w-full max-w-md bg-white z-50 shadow-2xl translate-x-full slide-over p-8 overflow-y-auto">
        </div>

    <div id="newProjectModal" class="hidden fixed inset-0 bg-slate-900/50 z-50 flex items-center justify-center">
        <div class="bg-white p-6 rounded-xl w-96 shadow-xl">
            <h3 class="font-bold mb-4">New Project</h3>
            <input id="new-p-name" type="text" placeholder="Project Name" class="w-full border p-2 rounded mb-4">
            <button onclick="createProject()" class="w-full bg-indigo-600 text-white py-2 rounded font-bold">Launch</button>
            <button onclick="closeModal('newProjectModal')" class="w-full text-slate-400 mt-2 text-sm">Cancel</button>
        </div>
    </div>

    <script>
        let state = JSON.parse(localStorage.getItem('ff_pro_state')) || {
            projects: [],
            activeView: 'home',
            activeProjectId: null,
            activeTab: 'list'
        };

        const users = ["Alex Rivers", "Sam Chen", "Jordan Blake", "Casey Wright"];

        function sync() {
            localStorage.setItem('ff_pro_state', JSON.stringify(state));
            render();
        }

        function setView(v) {
            state.activeView = v;
            state.activeProjectId = null;
            document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
            document.getElementById(`nav-${v}`).classList.add('active');
            document.getElementById('project-tabs').classList.add('hidden');
            sync();
        }

        function openProject(id) {
            state.activeProjectId = id;
            state.activeView = 'project-detail';
            document.getElementById('project-tabs').classList.remove('hidden');
            sync();
        }

        function setProjectTab(t) {
            state.activeTab = t;
            sync();
        }

        function createProject() {
            const name = document.getElementById('new-p-name').value;
            if(!name) return;
            state.projects.push({ id: Date.now(), name, tasks: [] });
            closeModal('newProjectModal');
            sync();
        }

        function addTask() {
            const p = state.projects.find(x => x.id === state.activeProjectId);
            const today = new Date().toISOString().split('T')[0];
            const nextWeek = new Date(Date.now() + 604800000).toISOString().split('T')[0];
            p.tasks.push({
                id: Date.now(),
                title: "New Task",
                desc: "",
                start: today,
                end: nextWeek,
                assignee: users[0],
                status: 'Todo',
                priority: 'Medium'
            });
            sync();
        }

        function openTaskDetail(taskId) {
            const p = state.projects.find(x => x.id === state.activeProjectId);
            const t = p.tasks.find(x => x.id === taskId);
            
            const detail = document.getElementById('taskDetail');
            detail.innerHTML = `
                <div class="flex justify-between items-center mb-8">
                    <span class="text-xs font-bold uppercase text-slate-400">Task Editor</span>
                    <button onclick="closeTaskDetail()" class="text-slate-400 hover:text-slate-600"><i class="fas fa-times text-xl"></i></button>
                </div>
                <div class="space-y-6">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Title</label>
                        <input type="text" value="${t.title}" onchange="updateTask(${t.id}, 'title', this.value)" class="w-full text-xl font-bold border-b border-transparent hover:border-slate-200 focus:border-indigo-500 outline-none transition-all">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Start Date</label>
                            <input type="date" value="${t.start}" onchange="updateTask(${t.id}, 'start', this.value)" class="w-full border rounded-lg p-2 text-sm">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Due Date</label>
                            <input type="date" value="${t.end}" onchange="updateTask(${t.id}, 'end', this.value)" class="w-full border rounded-lg p-2 text-sm">
                        </div>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Assignee</label>
                        <select onchange="updateTask(${t.id}, 'assignee', this.value)" class="w-full border rounded-lg p-2 text-sm">
                            ${users.map(u => `<option ${t.assignee === u ? 'selected' : ''}>${u}</option>`).join('')}
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Description</label>
                        <textarea onchange="updateTask(${t.id}, 'desc', this.value)" class="w-full border rounded-lg p-3 text-sm h-32" placeholder="Task notes...">${t.desc}</textarea>
                    </div>
                    <button onclick="deleteTask(${t.id})" class="text-red-500 text-xs font-bold hover:underline">Delete Task</button>
                </div>
            `;
            document.getElementById('taskOverlay').classList.remove('hidden');
            detail.classList.remove('translate-x-full');
        }

        function updateTask(tid, field, val) {
            const p = state.projects.find(x => x.id === state.activeProjectId);
            const t = p.tasks.find(x => x.id === tid);
            t[field] = val;
            sync();
        }

        function deleteTask(tid) {
            const p = state.projects.find(x => x.id === state.activeProjectId);
            p.tasks = p.tasks.filter(t => t.id !== tid);
            closeTaskDetail();
            sync();
        }

        function closeTaskDetail() {
            document.getElementById('taskOverlay').classList.add('hidden');
            document.getElementById('taskDetail').classList.add('translate-x-full');
        }

        function render() {
            const view = document.getElementById('viewport');
            const title = document.getElementById('view-title');

            if (state.activeView === 'home') {
                title.innerText = "Global Dashboard";
                view.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                        <div class="bg-white p-6 rounded-2xl border">
                            <p class="text-xs font-bold text-slate-400 uppercase mb-1">Active Projects</p>
                            <h3 class="text-3xl font-bold">${state.projects.length}</h3>
                        </div>
                        <div class="bg-white p-6 rounded-2xl border">
                            <p class="text-xs font-bold text-slate-400 uppercase mb-1">Total Tasks</p>
                            <h3 class="text-3xl font-bold text-indigo-600">${state.projects.reduce((a,p)=>a+p.tasks.length, 0)}</h3>
                        </div>
                    </div>
                    <h3 class="font-bold text-slate-800 mb-4">Jump Back In</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        ${state.projects.map(p => `
                            <div onclick="openProject(${p.id})" class="bg-white p-4 rounded-xl border border-transparent hover:border-indigo-500 cursor-pointer shadow-sm flex justify-between items-center transition-all">
                                <div><p class="font-bold">${p.name}</p><p class="text-xs text-slate-400">${p.tasks.length} Tasks</p></div>
                                <i class="fas fa-chevron-right text-slate-300"></i>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            if (state.activeView === 'project-detail') {
                const p = state.projects.find(x => x.id === state.activeProjectId);
                title.innerText = p.name;
                
                document.querySelectorAll('#project-tabs button').forEach(b => b.className = "h-full px-2 text-sm font-bold text-slate-400");
                document.getElementById(`tab-${state.activeTab}`).className = "tab-active h-full px-2 text-sm font-bold";

                if(state.activeTab === 'list') {
                    view.innerHTML = `
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="font-bold text-slate-800">Task List</h3>
                            <button onclick="addTask()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-bold">+ New Task</button>
                        </div>
                        <div class="bg-white rounded-2xl border overflow-hidden">
                            <table class="w-full text-left text-sm">
                                <thead class="bg-slate-50 border-b text-[10px] font-bold text-slate-400 uppercase">
                                    <tr>
                                        <th class="px-6 py-4">Status</th>
                                        <th class="px-6 py-4">Task</th>
                                        <th class="px-6 py-4">Assignee</th>
                                        <th class="px-6 py-4">Timeline</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-slate-100">
                                    ${p.tasks.map(t => `
                                        <tr onclick="openTaskDetail(${t.id})" class="hover:bg-slate-50 cursor-pointer transition-all">
                                            <td class="px-6 py-4"><span class="px-2 py-1 rounded-full text-[10px] font-bold bg-amber-100 text-amber-700">${t.status}</span></td>
                                            <td class="px-6 py-4 font-bold text-slate-700">${t.title}</td>
                                            <td class="px-6 py-4 text-slate-500">${t.assignee}</td>
                                            <td class="px-6 py-4 text-xs text-slate-400 font-medium">${t.start} — ${t.end}</td>
                                        </tr>
                                    `).join('') || '<tr><td colspan="4" class="text-center py-20 text-slate-300">No tasks in this project.</td></tr>'}
                                </tbody>
                            </table>
                        </div>
                    `;
                } else {
                    renderGantt(p);
                }
            }
        }

        function renderGantt(project) {
            const view = document.getElementById('viewport');
            if(!project.tasks.length) {
                view.innerHTML = `<div class="text-center py-20 text-slate-400">Add tasks with start/end dates to view Gantt</div>`;
                return;
            }

            // Calculate Date range
            const startDates = project.tasks.map(t => new Date(t.start));
            const endDates = project.tasks.map(t => new Date(t.end));
            const minDate = new Date(Math.min(...startDates));
            const maxDate = new Date(Math.max(...endDates));
            maxDate.setDate(maxDate.getDate() + 5); // Add buffer

            const totalDays = Math.ceil((maxDate - minDate) / (1000 * 60 * 60 * 24));
            const dayWidth = 40;

            let dateHeaders = "";
            for(let i=0; i<totalDays; i++) {
                const d = new Date(minDate);
                d.setDate(d.getDate() + i);
                dateHeaders += `<div class="shrink-0 border-r text-[9px] font-bold text-slate-400 text-center" style="width:${dayWidth}px">${d.getDate()}/${d.getMonth()+1}</div>`;
            }

            view.innerHTML = `
                <div class="bg-white rounded-2xl border overflow-hidden flex flex-col h-full shadow-sm">
                    <div class="flex border-b bg-slate-50 sticky top-0 z-10">
                        <div class="w-64 border-r p-4 font-bold text-xs text-slate-500 uppercase">Task Title</div>
                        <div class="flex-1 overflow-x-auto custom-scroll flex items-end pb-2">
                            ${dateHeaders}
                        </div>
                    </div>
                    <div class="flex-1 overflow-y-auto custom-scroll">
                        ${project.tasks.map(t => {
                            const taskStart = new Date(t.start);
                            const taskEnd = new Date(t.end);
                            const leftOffset = Math.ceil((taskStart - minDate) / (1000 * 60 * 60 * 24)) * dayWidth;
                            const width = (Math.ceil((taskEnd - taskStart) / (1000 * 60 * 60 * 24)) + 1) * dayWidth;

                            return `
                                <div class="flex gantt-row border-b group">
                                    <div class="w-64 shrink-0 border-r p-4 truncate text-sm font-bold text-slate-700">${t.title}</div>
                                    <div class="flex-1 relative overflow-x-hidden min-h-[50px] bg-slate-50/30">
                                        <div onclick="openTaskDetail(${t.id})" class="absolute top-3 h-6 bg-indigo-500 rounded-full shadow-lg cursor-pointer hover:bg-indigo-400 transition-colors flex items-center px-3" style="left:${leftOffset}px; width:${width}px">
                                            <span class="text-[9px] text-white font-bold truncate">${t.assignee}</span>
                                        </div>
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;
        }

        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        render();
    </script>
</body>
</html>
