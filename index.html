<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FluxForge</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: system-ui; }
.nav { padding:10px; border-radius:6px; display:block; cursor:pointer; }
.nav:hover { background:#374151; }
.active { background:#4f46e5; }
.card { background:white; padding:16px; border-radius:8px; box-shadow:0 2px 6px rgba(0,0,0,0.1); }
.column { min-height:300px; background:#f3f4f6; padding:10px; border-radius:8px; }
.task { background:white; padding:8px; border-radius:6px; margin-bottom:8px; cursor:grab; }
</style>
</head>

<body class="bg-gray-100">

<div class="flex min-h-screen">

<!-- SIDEBAR -->
<aside class="w-64 bg-gray-900 text-white p-4 flex flex-col">
  <h1 class="text-xl font-bold mb-6">FluxForge</h1>

  <div class="space-y-2">
    <div id="nav-dashboard" class="nav" onclick="nav('dashboard')">Dashboard</div>
    <div id="nav-projects" class="nav" onclick="nav('projects')">Projects</div>
    <div id="nav-kanban" class="nav" onclick="nav('kanban')">Kanban</div>
  </div>

  <button onclick="openModal()" class="mt-auto bg-indigo-600 py-2 rounded">
    + New Project
  </button>
</aside>

<!-- MAIN -->
<main class="flex-1 p-6">
  <h1 id="title" class="text-2xl font-bold mb-6"></h1>
  <div id="content"></div>
</main>

</div>

<!-- MODAL -->
<div id="modal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center">
  <div class="bg-white p-6 rounded w-96">
    <h2 class="font-bold mb-4">New Project</h2>

    <input id="name" class="w-full border p-2 mb-3" placeholder="Name">
    <textarea id="desc" class="w-full border p-2 mb-3" placeholder="Description"></textarea>

    <div class="flex justify-end gap-2">
      <button onclick="closeModal()">Cancel</button>
      <button onclick="saveProject()" class="bg-indigo-600 text-white px-4 py-2 rounded">Save</button>
    </div>
  </div>
</div>

<script>
/* STATE */
let projects = [];
let view = "dashboard";
let currentProject = null;

/* INIT */
window.onload = () => {
  load();
  render();
};

/* STORAGE */
function load() {
  const data = localStorage.getItem("fluxforge_pro");
  if (data) projects = JSON.parse(data);
}

function save() {
  localStorage.setItem("fluxforge_pro", JSON.stringify(projects));
}

/* NAV */
function nav(v) {
  view = v;
  render();
}

/* RENDER */
function render() {
  setActiveNav();

  if (view === "dashboard") dashboard();
  if (view === "projects") projectsView();
  if (view === "project") projectView();
  if (view === "kanban") kanbanView();
}

/* NAV UI */
function setActiveNav() {
  ["dashboard","projects","kanban"].forEach(id => {
    document.getElementById("nav-"+id).classList.remove("active");
  });
  document.getElementById("nav-"+view)?.classList.add("active");
}

/* DASHBOARD */
function dashboard() {
  setTitle("Dashboard");

  const totalTasks = projects.reduce((sum,p)=>sum+p.tasks.length,0);

  setContent(`
    <div class="grid grid-cols-3 gap-4">
      <div class="card">Projects: ${projects.length}</div>
      <div class="card">Tasks: ${totalTasks}</div>
      <div class="card">Productivity: 🚀</div>
    </div>
  `);
}

/* PROJECT LIST */
function projectsView() {
  setTitle("Projects");

  if (!projects.length) {
    setContent(`<p>No projects yet</p>`);
    return;
  }

  setContent(`
    <div class="grid gap-4">
      ${projects.map(p => `
        <div class="card">
          <h3 class="font-bold">${p.name}</h3>
          <p class="text-sm">${p.desc}</p>
          <button onclick="openProject('${p.id}')" class="text-indigo-600 mt-2">Open</button>
        </div>
      `).join("")}
    </div>
  `);
}

/* PROJECT DETAIL */
function openProject(id) {
  currentProject = id;
  view = "project";
  render();
}

function projectView() {
  const p = projects.find(x=>x.id===currentProject);

  setTitle(p.name);

  setContent(`
    <input id="taskInput" class="border p-2 mb-3" placeholder="New task">
    <button onclick="addTask()" class="bg-indigo-600 text-white px-3 py-1 rounded">Add</button>

    <ul class="mt-4">
      ${p.tasks.map(t=>`<li>${t.title} (${t.status})</li>`).join("")}
    </ul>
  `);
}

/* TASK */
function addTask() {
  const val = document.getElementById("taskInput").value;
  if (!val) return;

  const p = projects.find(x=>x.id===currentProject);

  p.tasks.push({
    id: Date.now(),
    title: val,
    status: "todo"
  });

  save();
  projectView();
}

/* KANBAN */
function kanbanView() {
  setTitle("Kanban");

  const tasks = projects.flatMap(p=>p.tasks);

  setContent(`
    <div class="grid grid-cols-3 gap-4">
      ${["todo","doing","done"].map(col => `
        <div class="column" ondragover="allowDrop(event)" ondrop="drop(event,'${col}')">
          <h3 class="font-bold mb-2">${col.toUpperCase()}</h3>
          ${tasks.filter(t=>t.status===col).map(t=>`
            <div class="task" draggable="true" ondragstart="drag(event,'${t.id}')">
              ${t.title}
            </div>
          `).join("")}
        </div>
      `).join("")}
    </div>
  `);
}

/* DRAG */
let draggedId = null;

function drag(e,id){ draggedId = id; }
function allowDrop(e){ e.preventDefault(); }

function drop(e,status){
  e.preventDefault();
  projects.forEach(p=>{
    p.tasks.forEach(t=>{
      if(t.id==draggedId){ t.status=status; }
    });
  });
  save();
  kanbanView();
}

/* MODAL */
function openModal(){ document.getElementById("modal").classList.remove("hidden"); }
function closeModal(){ document.getElementById("modal").classList.add("hidden"); }

/* CREATE PROJECT */
function saveProject(){
  const name = document.getElementById("name").value;
  const desc = document.getElementById("desc").value;

  if(!name) return;

  projects.push({
    id: Date.now().toString(),
    name,
    desc,
    tasks:[]
  });

  save();
  closeModal();
  nav("projects");
}

/* UTILS */
function setTitle(t){ document.getElementById("title").innerText=t; }
function setContent(html){ document.getElementById("content").innerHTML=html; }

</script>

</body>
</html>
